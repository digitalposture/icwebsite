{% if page.wsDatatableIds %}

<!-- DataTables  js if async => lines#74 does not work properly -->
<script type="text/javascript" id="datatables-script" src="//code.jquery.com/jquery-3.5.1.min.js"></script>
<script type="text/javascript" id="jquery-script" src="//cdn.datatables.net/2.3.7/js/dataTables.min.js"></script>

<!-- First, this walks through the tables that occur between ...-begin
         and ...-end and add the "datatable" class to them.
         Then it invokes DataTable's standard initializer
         Credit here: http://www.beardedhacker.com/blog/2015/08/28/add-class-attribute-to-markdown-table/
      -->

<script>
    console.log('JS DataTables starting...');
    const tableIds = {{ page.wsDatatableIds | jsonify }};
    const tableCols = {{ page.wsDatatableCols | jsonify }};
    const tablePaths = {{ page.wsDatatablePaths | jsonify }};
    const tableRespCols = {{ page.wsDatatableRespCols | jsonify }};
    console.log('DataTables tableIds:', tableIds);
    console.log('DataTables tableCols:', tableCols);
    console.log('DataTables tablePaths:', tablePaths);

    var extractData = function (dataRaw, tablePos) {
        // split header
        const header = dataRaw[0].split('{{ site.ws_csv_delimiter }}');

        // map column name -> index
        const colIndex = {};

        header.forEach((col, idx) => {
            colIndex[col] = idx;
        });

        // extract rows without header
        return dataRaw.slice(1).map(row => {

            const cols = row.split('{{ site.ws_csv_delimiter }}');

            return (tableRespCols != undefined && tableRespCols[tablePos].length > 0)? tableRespCols[tablePos].map(colName => {
                const idx = colIndex[colName];

                return idx !== undefined ? cols[idx] : '';
            }):row.split('{{ site.ws_csv_delimiter }}'); ;

        });
    };

    // function to update DataTable with query string, page.wsDatatablePath is needed.
    var dtUpdate = function (tablePos, queryString) {
        const urlPath = tablePaths[tablePos] + queryString;
        console.log('==> Calling... {{ site.wsUrl }}' + urlPath)
        var secret = "{{ site.wsSecret }}";
        fetch('{{ site.wsUrl }}' + urlPath, {
            method: "GET",
            headers: {
                "Content-Type": "application/json",
                "Authorization": "Bearer " + secret
            }
        })
            .then(response => response.json())
            .then(dataRaw => {
                // console.log('dataRaw retrieved:', dataRaw, dataRaw.length);
                let data = extractData(dataRaw, tablePos);
                console.log('Extracted data:', data, data.length);
                let table = new DataTable('#' + tableIds[tablePos]);
                table.clear(); // Clear existing data
                table.rows.add(data); // Add new data
                table.draw(); // Redraw the table to reflect the new data
                console.log('Certificates data loaded:', data.length, data);
            })
            .catch (error => console.error('Error fetching certificates:', error));
        }; // dtUpdate


    $(document).ready(function () {
        {% assign n = page.wsDatatableIds.size | minus: 1 %}
        if ('{{ page.wsDatatableAutoLoad }}' == 'true') {
            console.log('Auto-loading DataTable with initial data... {{ page.url}} {{ page.wsDatatableAutoLoad }}');
            {% for tablePos in (0..n) %}
                dtUpdate({{ tablePos }},''); // initial load with empty query string
            {% endfor %}
        }
        console.log('DataTables document ready, applying styles to...');
        // TODO: autoload data per table
        // let dtRun = $('#dTable').data('dt-run');
        // if (dtRun != undefined && !dtRun) return;
        let dtStyle = ""; 
        {% for tablePos in (0..n) %}
            dtStyle = $('#' + tableIds[{{tablePos}}]).data('dt-style');
            console.log("tableId: ", tableIds[{{tablePos}}], "dtStyle: ", dtStyle);
            if (dtStyle == "basic") {
                new DataTable('#' + tableIds[{{tablePos}}], {
                    info: false,
                    ordering: false,
                    layout: {
                        topEnd: null
                    },
                    paging: false
                });
            } // basic style
        {% endfor %}
    });
</script>

{%- endif %}
