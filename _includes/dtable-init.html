<script src="/assets/js/icws.js"></script>
<script>
    console.log('dtable-init.html INIT -- loads DataTables JS');
</script>
{% if page.wsDatatableIds %}

<!-- DataTables dependencies -->
<script id="jquery-script" src="//code.jquery.com/jquery-3.5.1.min.js"></script>
<script id="datatables-script" src="//cdn.datatables.net/2.3.7/js/dataTables.min.js"></script>

<script>
    // ── Page-specific config (Liquid-rendered) ───────────────────────────────
    const tableIds      = {{ page.wsDatatableIds | jsonify }};
    const tablePaths    = {{ page.wsDatatablePaths | jsonify }};
    const tableRespCols = {{ page.wsDatatableRespCols | jsonify }} || null;
    const _DT_DELIMITER = '{{ site.ws_csv_delimiter }}';
    const _DT_WS_URL    = '{{ site.wsUrl }}';
    const _DT_WS_SECRET = '{{ site.data.env_vars.wsSecret }}';

    const createLink = function (value) {
        const ISIN_RE = /^[A-Z]{2}[A-Z0-9]{9}[0-9]$/;

        let link = "#";

        if (/^https?:\/\//.test(value)) {
            link = value;
        } else if (ISIN_RE.test(value)) {
            link = '/certificates/' + encodeURIComponent(value);
        }

        return link;
    };

    // ── dtDraw / dtUpdate ────────────────────────────────────────────────────
    // These closures capture the page-specific vars above and delegate the
    // shared extraction logic to extractData() defined in icws.js.

    const dtDraw = function (tablePos, dataRaw) {
        const data  = extractData(dataRaw, tablePos, tableRespCols, _DT_DELIMITER);
        const table = new DataTable('#' + tableIds[tablePos]);
        table.clear();
        table.rows.add(data);
        table.draw();
    };

    const dtUpdate = function (tablePos, queryString) {
        if (queryString === 'N/A') return;
        const url = _DT_WS_URL + tablePaths[tablePos] + queryString;
        fetch(url, {
            method: 'GET',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': 'Bearer ' + _DT_WS_SECRET
            }
        })
            .then(r => r.json())
            .then(dataRaw => dtDraw(tablePos, dataRaw))
            .catch(err => console.error('dtUpdate error (table ' + tablePos + '):', err));
    };

    // ── DataTable initialisation ─────────────────────────────────────────────
    document.addEventListener('DOMContentLoaded', function () {
        {% assign n = page.wsDatatableIds.size | minus: 1 %}

        {% if page.wsDatatableAutoLoad %}
            {% for tablePos in (0..n) %}
                dtUpdate({{ tablePos }}, '');
            {% endfor %}
        {% endif %}

        {% for tablePos in (0..n) %}
        (function () {
            const tableId = tableIds[{{ tablePos }}];
            const el = document.getElementById(tableId);
            if (!el) return;
            let dtOptions = el.dataset.mdtStyle === 'basic'
                ? { info: false, ordering: false, paging: false, layout: { topEnd: null } }
                : {};
            dtOptions.columnDefs = [
                {
                    targets: 0, // colonna ISIN or a URL
                    render: function (data, type) {
                        console.log('Rendering ISIN column:', data, type);
                        if (type !== 'display' || !data) return data;
                        const value = String(data).trim();
                        const link = createLink(value);
                        return '<a href="' + link + '">' + value + '</a>';
                    }
                }
            ];
            new DataTable('#' + tableId, dtOptions);
        })();
        {% endfor %}
    });

</script>

{%- endif %}
