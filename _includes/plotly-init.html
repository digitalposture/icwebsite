<script src="/assets/js/icws.js"></script>
<script>
    console.log('plotly-init.html INIT -- loads Plotly and D3');
</script>
{% if page.hasPlot %}
<script src='https://cdn.plot.ly/plotly-3.4.0.min.js'></script>
<script src='https://cdnjs.cloudflare.com/ajax/libs/d3/3.5.17/d3.min.js'></script>
<script>
    // Auto-draw radar chart if page has defined radarRawData in its own <script> block.
    // Wrapped in DOMContentLoaded to ensure radarRawData is set and Plotly is ready.
    document.addEventListener('DOMContentLoaded', function () {
        if (window.radarRawData !== undefined) {
            drawRadarPlotly('{{ page.radarId }}', radarRawData);
        }
    });
</script>
{%- endif %}
