{% if page.hasPlot %}
<script src='https://cdn.plot.ly/plotly-3.4.0.min.js'></script>
<script src='https://cdnjs.cloudflare.com/ajax/libs/d3/3.5.17/d3.min.js'></script>

<script>
    // usage: const plotlyData = createPlotlyData(rows, 0, 3);
    // where rows is an array of CSV lines, and 0 and 3 are the positions of source and target in the CSV columns
    const LBL_MAX_LEN = 100;
    const normalize = (str) =>
        str
            .normalize("NFD")                 // split accents
            .replace(/[\u0300-\u036f]/g, "")  // remove accents
            .replaceAll(",", "-")             // replace commas
            .trim();
    const cutIf = (str, maxLen) =>
        str.length > maxLen
            ? str.slice(0, maxLen) + "...\n"
            : str;

    const createPlotlyData = (rows, sourcePos, targetPos, sourceLblPos, targetLblPos) => {
        // unique nodes
        const sources = [];
        const targets = [];

        // links
        const relations = [];

        // skip header
        rows.forEach(row => {
            const cols = row.split('{{ site.ws_csv_delimiter }}');

            const source = cols[sourcePos || 0];
            const target = cols[targetPos || 3];
            const sourceLbl = (sourcePos == sourceLblPos) 
                ? cutIf(cols[sourceLblPos || sourcePos || 0], LBL_MAX_LEN) 
                : cutIf(cols[sourceLblPos || sourcePos || 0], LBL_MAX_LEN) + " (" + source + ")";
            const targetLbl = (targetPos == targetLblPos) 
                ? cutIf(cols[targetLblPos || targetPos || 3], LBL_MAX_LEN) 
                : cutIf(cols[targetLblPos || targetPos || 3], LBL_MAX_LEN) + " (" + target + ")";

            if (!targets.includes(target)) {
                targets.push(targetLbl);
            }

            if (!sources.includes(source)) {
                sources.push(sourceLbl);
            }

            relations.push([sourceLbl, targetLbl]);
        });

        // labels and colors
        const labels = [
            ...sources,
            ...targets
        ];

        const colors = [
            ...sources.map(() => "blue"),
            ...targets.map(() => "green")
        ];

        // map label -> position
        const positions = {};

        labels.forEach((label, index) => {
            positions[label] = index;
        });

        // build links
        const source = [];
        const target = [];
        const value = [];

        relations.forEach(([sourceLabel, targetLabel]) => {
            source.push(positions[sourceLabel]);
            target.push(positions[targetLabel]);
            value.push(1);
        });

        return {
            node: {
                label: labels,
                color: colors
            },
            link: {
                source,
                target,
                value
            }
        };
    };

    const drawPlotly = (data, isSwapped) => {
        // check if data is not empty
        if (!data || !data.node || !data.link) {
            console.error("Invalid data for Plotly:", data);
            return;
        }
        const sources = isSwapped ? data.link.target : data.link.source;
        const targets = isSwapped ? data.link.source : data.link.target;
        const plotData = [{
            type: "sankey",
              domain: {
    x: [0,1],
    y: [0,1]
  },
            orientation: "h",
            node: {
                pad: 15,
                thickness: 30,
                line: {
                    color: "black",
                    width: 0.5
                },
                label: data.node.label,
                color: data.node.color
            },

            link: {
                source: sources,
                target: targets,
                value: data.link.value
            }
        }];

        console.log("test::plotlyData:", plotData);

        const layout = {
            title: "Sankey Diagram",
            font: {
                size: 10
            }
        };

        Plotly.react('plotlyid', plotData, layout, {displayModeBar: false});
        Plotly.Plots.resize('plotlyid');
    };


    // RADAR CHART
    const drawRadarPlotly = (radarId, rawData) => {
        const dimensions = ['Usability','Exhaustiveness','Clarity', 'Accuracy', 'Discoverability', 'Usability'];
       
        let data = [];
        for (let i = 0; i < rawData.length; i++) {
            data.push({
                type: 'scatterpolar',
                r: rawData[i].r,
                theta: dimensions,
                fill: 'toself',
                name: rawData[i].name
            });
        };

        layout = {
        polar: {
            radialaxis: {
            visible: true,
            range: [0, 5]
            }
        }
        }

        Plotly.newPlot(radarId, data, layout, {displayModeBar: false});

    };

    // auto-draw by using page properties
    if (window.radarRawData !== undefined) drawRadarPlotly( '{{ page.radarId }}', radarRawData);
</script>
<script>
    const unpack = (rows, key) => {
        return rows.map(function(row) { return row[key]; });
    }

    function extractColumn(data, columnName) {
        if (!Array.isArray(data) || data.length === 0) return [];

        const header = data[0].split(';');
        const index = header.indexOf(columnName);

        if (index === -1) return []; // column not found

        return data.slice(1).map(row => {
            const parts = row.split(';');
            return parts[index] || '';
        });
    }

    const drawSunburst = (data) => {
        var layout = {
            margin: { l: 0, r: 0, b: 0, t: 0 }
        };
        Plotly.newPlot('plotlyid', data, layout, {showSendToCloud: true});
    }

    const prepareSunburstData = (rows) => {
        var pcts = extractColumn(rows, 'avgs');
        console.log('avgs:', pcts);
        var values = pcts.map(v => Math.abs(v));
        var data = [
            {
            type: "sunburst",
            maxdepth: 4,
            ids: extractColumn(rows, 'ids'),
            labels: extractColumn(rows, 'labels'),
            parents:extractColumn(rows, 'parents'),
            values:values,
            leaf: { opacity: 0.4 },
            textinfo: "label",
            hoverinfo: "label+text",
            hovertext: pcts.map(v => v + "%"),
            marker: {
                line: { width: 2 },
                colors: pcts,     // signed → red/green
                cauto: true,
                colorscale: [
                [0, "red"],
                [1, "green"]
                ]
            }
            }
        ];

        return data;

    }
</script>
{%- endif %}
