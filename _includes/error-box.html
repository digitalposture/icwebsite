{% assign errorBoxId = include.errorBoxId | default: "errorBox" %}

<div id="{{ errorBoxId }}" class="message-box error hidden"></div>
<script>
    // usage:
    /*
    ErrorBox.show("Something went wrong", "myErrorBoxId");
    ErrorBox.clear("myErrorBoxId");
    */
window.ErrorBox ??= (function () {

    const timers = {};

    function clear(boxId = 'errorBox') {
        const errorBox = document.getElementById(boxId);

        if (!errorBox) return;

        // cancel pending auto-clear
        if (timers[boxId]) {
            clearTimeout(timers[boxId]);
            delete timers[boxId];
        }

        errorBox.textContent = '';
        errorBox.classList.add('hidden');
    }

    function show(message, boxId = 'errorBox', autoClearMs = 3000) {
        clear(boxId);

        const errorBox = document.getElementById(boxId);

        if (!errorBox) return;

        errorBox.textContent = message;
        errorBox.classList.remove('hidden');

        // schedule auto-clear if requested
        if (autoClearMs > 0) {
            timers[boxId] = setTimeout(() => {
                clear(boxId);
            }, autoClearMs);
        }
    }

 function isValidISINFormat(isin) {
        return /^[A-Z]{2}[A-Z0-9]{9}[0-9]$/.test(
            String(isin).trim().toUpperCase()
        );
    }

    function splitIsins(csvString) {
        const valid = [];
        const invalid = [];

        String(csvString)
            .split(',')
            .map(x => x.trim().toUpperCase())
            .filter(Boolean)
            .forEach(isin => {
                if (isValidISINFormat(isin)) {
                    valid.push(isin);
                } else {
                    invalid.push(isin);
                }
            });

        return {
            validIsins: valid.join(','),
            invalidIsins: invalid.join(',')
        };
    }
    function validateIsinList(isinList, boxId = 'errorBox', autoClearMs = 10000) {
        const { validIsins, invalidIsins } = splitIsins(isinList);

        if (invalidIsins) {
            show(
                `The following ISIN(s) seems to be invalid: ${invalidIsins}`,
                boxId,
                autoClearMs
            );
        }

        return validIsins;
    }

    return {
        show,
        clear,
        isValidISINFormat,
        splitIsins,
        validateIsinList
    };

})();
    
</script>
